<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Career Guidance | Personalized Career Paths & Job Insights</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logos/AiCareerGuidanceLogo.png" />

    <!-- SEO Meta -->
    <meta
      name="description"
      content="AI Career Guidance helps you discover personalized career paths, skill recommendations,
       and job insights powered by artificial intelligence."
    />
    <meta
      name="keywords"
      content="AI career guidance, career planning, career advice, job recommendations,
       skill assessment, AI career coach"
    />
    <meta name="author" content="AI Career Guidance" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta
      property="og:title"
      content="AI Career Guidance - Your Path to Success"
    />
    <meta
      property="og:description"
      content="Discover your ideal career path with AI-powered insights, personalized guidance,
       and skill recommendations."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta
      property="og:image"
      content="https://yourdomain.com/logos/AiCareerGuidanceLogo.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="AI Career Guidance - Your Path to Success"
    />
    <meta
      name="twitter:description"
      content="AI-powered career guidance to help you choose the right path, grow your skills,
       and land better opportunities."
    />
    <meta
      name="twitter:image"
      content="https://yourdomain.com/logos/AiCareerGuidanceLogo.png"
    />

    <!-- App -->
    <meta name="theme-color" content="#0f172a" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
